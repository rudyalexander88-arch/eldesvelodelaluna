<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrarse | El Desvelo de la Luna | R.DeLeon</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header>

   <div class="logo">El Desvelo de la Luna
   
   </div>

    <nav>

        <ul>

            <li><a href="index.html">Inicio</a></li>

            <li><a href="login.html">Iniciar Sesión</a></li>

        </ul>

    </nav>

</header>

<section class="auth-container">

    <div class="auth-imagen">

        <img src="img/poeta_icon_.png" alt="Poeta">

    </div>

    <div class="auth-card">

        <h1>Crear Cuenta</h1>

        <p class="subtitulo">

            Forma parte de este viaje entre versos.<br>
            Cada lector también escribe una historia.

        </p>

        <form id="registroForm">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required>

            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
                required>

            <input
                type="text"
                id="usuario"
                placeholder="Nombre de usuario"
                required>

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required>

            <input
                type="password"
                id="confirmarPassword"
                placeholder="Confirmar contraseña"
                required>

            <button type="submit">

                Crear Cuenta

            </button>

        </form>

        <div id="mensajeRegistro" class="mensaje"></div>

        <p class="link">

            ¿Ya tienes una cuenta?

            <a href="login.html">

                Inicia sesión

            </a>

        </p>

    </div>

</section>

<script src="js/registro.js"></script>

</body>

</html>
