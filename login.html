<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión | El Desvelo de la Luna | R.DeLeon</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header>

    <div class="logo">

        RDeLeon

    </div>

    <nav>

        <ul>

            <li><a href="index.html">Inicio</a></li>

            <li><a href="registro.html">Registrarse</a></li>

        </ul>

    </nav>

</header>

<section class="auth-container">

    <div class="auth-imagen">

        <img src="img/logo.png" alt="Poeta">

    </div>

    <div class="auth-card">

        <h1>Bienvenido de nuevo</h1>

        <p class="subtitulo">

            Continúa este viaje entre versos.
            <br>
            La poesía también recuerda a quienes regresan.

        </p>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario o correo electrónico"
                required>

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required>

            <label class="recordar">

                <input type="checkbox" id="recordarme">

                Recordarme

            </label>

            <button type="submit">

                Iniciar Sesión

            </button>

        </form>

        <div id="mensajeLogin" class="mensaje"></div>

        <p class="link">

            ¿Aún no tienes una cuenta?

            <a href="registro.html">

                Regístrate aquí

            </a>

        </p>

    </div>

</section>

<script src="js/login.js"></script>

</body>

</html>
